# Normal Codex and Ralph work uses the workspace sandbox.
default_permissions = ":workspace"

# Ralph selects this profile only for slices that declare the
# `postgresql-five-race-acceptance` runtime capability.
[permissions.ralph-postgres]
description = "Ralph workspace access plus the local PostgreSQL test socket."
extends = ":workspace"

[permissions.ralph-postgres.network]
enabled = true

# No allowed domains: blocks normal internet/network destinations.
[permissions.ralph-postgres.network.domains]

# Allow only the local PostgreSQL Unix socket.
[permissions.ralph-postgres.network.unix_sockets]
"/tmp/.s.PGSQL.5432" = "allow"
