<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>004I Member Sensitive Reveal Visual Evidence</title>
    <style>
      body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #0f172a; }
      .page { padding: 24px; max-width: 980px; margin: 0 auto; }
      .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04); }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
      .tile { display: flex; align-items: flex-start; gap: 12px; background: #fffbeb; border: 1px solid #fef3c7; border-radius: 8px; padding: 12px; }
      .label { font-size: 12px; color: #64748b; margin: 0 0 4px; }
      .value { font-size: 14px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-weight: 700; margin: 0; }
      .field { width: 100%; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px 10px; font-size: 14px; margin-top: 12px; }
      .button { margin-top: 8px; border: 1px solid #cbd5e1; border-radius: 6px; background: #fff; color: #334155; padding: 7px 10px; font-size: 12px; font-weight: 600; }
      .message { font-size: 12px; color: #475569; margin: 8px 0 0; }
      .heading { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: .04em; font-weight: 700; margin: 0 0 12px; }
      @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <p class="heading">Sensitive Identifiers - Masked</p>
        <div class="grid">
          <div class="tile">
            <div style="flex: 1">
              <p class="label">PAN</p>
              <p class="value">******234F</p>
              <input class="field" placeholder="Reason to reveal PAN" aria-label="Reason to reveal PAN" />
              <p class="message">Reason is required before reveal.</p>
              <button class="button" type="button">Reveal</button>
            </div>
            <span aria-hidden="true">Lock</span>
          </div>
          <div class="tile">
            <div style="flex: 1">
              <p class="label">Aadhaar</p>
              <p class="value">********9012</p>
            </div>
            <span aria-hidden="true">Lock</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
