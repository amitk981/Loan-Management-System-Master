name: CI

on:
  push:
    branches: [main, staging]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sfpcl-lms
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.6
          cache: npm
          cache-dependency-path: sfpcl-lms/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      # Report-only until the Node 20 / Vite upgrade clears the esbuild dev-server
      # advisory (GHSA-67mh-4wv8-2f99, dev server only). Tighten in slice 012F.
      - run: npm audit --audit-level=high
        continue-on-error: true

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            sfpcl_credit/requirements.txt
            sfpcl_credit/requirements-dev.txt
      - name: Install legal PDF Unicode fonts
        run: |
          sudo apt-get update
          sudo apt-get install --yes fonts-noto-core
          test -f /usr/share/fonts/truetype/noto/NotoSansDevanagari-Regular.ttf
      - run: pip install -r sfpcl_credit/requirements-dev.txt
      - run: python sfpcl_credit/manage.py check
      - run: python sfpcl_credit/manage.py makemigrations --check --dry-run
      - name: Run four-worker full backend coverage
        # GitHub's public ubuntu-latest runner has four vCPUs. The shared helper
        # preserves the complete test label and combines subprocess coverage.
        run: ./scripts/ralph-parallel-backend-coverage.sh "$(command -v python)" "$GITHUB_WORKSPACE" sfpcl_credit 4 85
      # Report-only until slice 012F hardens dependency pins.
      - run: pip install pip-audit && pip-audit -r sfpcl_credit/requirements.txt
        continue-on-error: true
