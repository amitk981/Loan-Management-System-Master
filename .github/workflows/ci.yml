name: CI

on:
  push:
    branches: [main, staging]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sfpcl-lms
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sfpcl-lms/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      # Report-only until the Node 20 / Vite upgrade clears the esbuild dev-server
      # advisory (GHSA-67mh-4wv8-2f99, dev server only). Tighten in slice 012F.
      - run: npm audit --audit-level=high
        continue-on-error: true

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r sfpcl_credit/requirements-dev.txt
      - run: python sfpcl_credit/manage.py check
      - run: python sfpcl_credit/manage.py makemigrations --check --dry-run
      - run: python -m coverage run --source=sfpcl_credit sfpcl_credit/manage.py test sfpcl_credit.tests
      # Keep in sync with quality_gates.coverage_fail_under in .ralph/config.yaml.
      - run: python -m coverage report --fail-under=85
      # Report-only until slice 012F hardens dependency pins.
      - run: pip install pip-audit && pip-audit -r sfpcl_credit/requirements.txt
        continue-on-error: true
